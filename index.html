<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Weather Dashboard — consulte o clima atual e previsões para qualquer cidade do mundo.">
    <title>Weather Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2'><circle cx='12' cy='12' r='5'/><path d='M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42'/></svg>" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/css/style.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  </head>
  <body>
    <div id="app" class="app-container">

      <!-- ── Header / Search ── -->
      <header>
        <div class="search-bar">
          <i data-lucide="search"></i>
          <input type="text" id="search-input" placeholder="Buscar cidade..." autocomplete="off">
          <button id="location-btn" aria-label="Usar minha localização">
            <i data-lucide="navigation-2"></i>
          </button>
        </div>
      </header>

      <!-- ── Dashboard ── -->
      <main class="dashboard">

        <!-- Loading -->
        <div id="global-loading" class="hidden">
          <div class="spinner"></div>
          <p>Buscando clima...</p>
        </div>

        <!-- Error -->
        <p id="error-message" class="hidden">Cidade não encontrada. Tente outra busca.</p>

        <!-- Content Grid -->
        <div id="weather-content" class="weather-content hidden">

          <!-- ① Hero Card — Clima Atual -->
          <section class="current-weather glass" id="current-weather-card">
            <div class="current-weather-info">
              <h1 class="city" id="current-city">—</h1>
              <p class="date" id="current-date">—</p>
              <div class="temp-row">
                <span class="temp" id="current-temp">—</span>
                <span class="temp-unit">°C</span>
              </div>
              <p class="description" id="current-desc">—</p>
            </div>
            <!-- Hero Icon injetado via JS -->
            <div class="weather-icon-hero" id="hero-icon"></div>
          </section>

          <!-- ② Previsão Horária -->
          <section class="hourly-forecast glass">
            <p class="section-label">Hoje — Por Hora</p>
            <div class="hourly-scroll" id="hourly-container"></div>
          </section>

          <!-- ③ 7 Dias (sidebar) -->
          <section class="daily-forecast glass">
            <p class="section-label" style="margin-bottom:1.2rem">Próximos 7 Dias</p>
            <div class="daily-list" id="daily-container"></div>
          </section>

          <!-- ④ Métricas Avançadas -->
          <section class="metrics-section">

            <div class="metric-card glass">
              <p class="metric-label"><i data-lucide="thermometer"></i> Sensação Térmica</p>
              <p class="metric-val"><span id="feels-like">—</span><span class="metric-unit">°</span></p>
            </div>

            <div class="metric-card glass">
              <p class="metric-label"><i data-lucide="droplets"></i> Umidade</p>
              <p class="metric-val"><span id="humidity">—</span><span class="metric-unit">%</span></p>
            </div>

            <div class="metric-card glass">
              <p class="metric-label"><i data-lucide="wind"></i> Vento</p>
              <p class="metric-val"><span id="wind">—</span><span class="metric-unit"> km/h</span></p>
            </div>

            <div class="metric-card glass">
              <p class="metric-label"><i data-lucide="sun"></i> Índice UV</p>
              <p class="metric-val" id="uv-index">—</p>
              <p class="metric-sub" id="uv-label"></p>
            </div>

            <div class="metric-card glass">
              <p class="metric-label"><i data-lucide="eye"></i> Visibilidade</p>
              <p class="metric-val"><span id="visibility">—</span><span class="metric-unit"> km</span></p>
            </div>

            <div class="metric-card glass">
              <p class="metric-label"><i data-lucide="gauge"></i> Pressão</p>
              <p class="metric-val"><span id="pressure">—</span><span class="metric-unit"> hPa</span></p>
            </div>

          </section>

        </div><!-- /weather-content -->
      </main>
    </div>

    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
