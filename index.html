<!doctype html>
<html lang="pt-BR" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Weather Dashboard — consulte o clima atual e previsões para qualquer cidade do mundo.">
    <title>Weather Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2'><circle cx='12' cy='12' r='5'/><path d='M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42'/></svg>" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/css/style.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  </head>
  <body>
    <div id="app" class="app-container">

      <!-- ── Header ── -->
      <header>
        <div class="search-bar">
          <i data-lucide="search"></i>
          <input type="text" id="search-input" placeholder="Buscar cidade..." autocomplete="off">
          <button id="location-btn" aria-label="Usar minha localização" title="Usar minha localização">
            <i data-lucide="navigation-2"></i>
          </button>
        </div>

        <!-- Theme toggle -->
        <button id="theme-toggle" aria-label="Alternar tema" title="Alternar tema claro/escuro">
          <i data-lucide="sun" id="theme-icon-light"></i>
          <i data-lucide="moon" id="theme-icon-dark" class="hidden"></i>
        </button>
      </header>

      <!-- ── Dashboard ── -->
      <main class="dashboard">

        <!-- Loading -->
        <div id="global-loading" class="hidden loading-state">
          <div class="spinner"></div>
          <p>Buscando clima...</p>
        </div>

        <!-- Error -->
        <p id="error-message" class="hidden error-box"></p>

        <!-- Content Grid -->
        <div id="weather-content" class="weather-content hidden">

          <!-- ① Hero — Clima Atual -->
          <section class="current-weather glass" id="current-weather-card">
            <div class="current-weather-info">

              <!-- Cidade + País -->
              <div class="city-row">
                <i data-lucide="map-pin" class="city-pin-icon"></i>
                <div>
                  <h1 class="city" id="current-city">—</h1>
                  <p class="country" id="current-country"></p>
                </div>
              </div>

              <p class="date" id="current-date">—</p>

              <div class="temp-row">
                <span class="temp" id="current-temp">—</span>
                <span class="temp-unit">°C</span>
              </div>

              <p class="description" id="current-desc">—</p>

              <!-- Mini info row: Chuva hoje + Vento -->
              <div class="hero-extras">
                <span class="hero-extra-item">
                  <i data-lucide="droplets"></i>
                  <span id="precip-chance">—</span>% de chuva
                </span>
                <span class="hero-extra-item">
                  <i data-lucide="wind"></i>
                  <span id="hero-wind">—</span> km/h
                </span>
              </div>

            </div>
            <!-- Hero Icon -->
            <div class="weather-icon-hero" id="hero-icon"></div>
          </section>

          <!-- ② Previsão Horária -->
          <section class="hourly-forecast glass">
            <p class="section-label">
              <i data-lucide="clock"></i> Hoje — Por Hora
            </p>
            <div class="hourly-scroll" id="hourly-container"></div>
          </section>

          <!-- ③ 7 Dias (sidebar) -->
          <section class="daily-forecast glass">
            <p class="section-label">
              <i data-lucide="calendar-days"></i> Próximos 7 Dias
            </p>
            <div class="daily-list" id="daily-container"></div>

            <!-- Nascer e pôr do sol -->
            <div class="sun-times">
              <div class="sun-time-item">
                <i data-lucide="sunrise"></i>
                <div>
                  <p class="sun-label">Nascer</p>
                  <p class="sun-val" id="sunrise-time">—</p>
                </div>
              </div>
              <div class="sun-time-item">
                <i data-lucide="sunset"></i>
                <div>
                  <p class="sun-label">Pôr do Sol</p>
                  <p class="sun-val" id="sunset-time">—</p>
                </div>
              </div>
            </div>
          </section>

          <!-- ④ Métricas Avançadas -->
          <section class="metrics-section">

            <div class="metric-card glass">
              <p class="metric-label"><i data-lucide="thermometer"></i> Sensação Térmica</p>
              <p class="metric-val"><span id="feels-like">—</span><span class="metric-unit">°C</span></p>
            </div>

            <div class="metric-card glass">
              <p class="metric-label"><i data-lucide="droplets"></i> Umidade</p>
              <p class="metric-val"><span id="humidity">—</span><span class="metric-unit">%</span></p>
            </div>

            <div class="metric-card glass">
              <p class="metric-label"><i data-lucide="wind"></i> Vento</p>
              <p class="metric-val"><span id="wind">—</span><span class="metric-unit"> km/h</span></p>
              <p class="metric-sub" id="wind-dir-label"></p>
            </div>

            <div class="metric-card glass">
              <p class="metric-label"><i data-lucide="sun"></i> Índice UV</p>
              <p class="metric-val" id="uv-value">—</p>
              <div class="uv-bar-wrap"><div class="uv-bar" id="uv-bar"></div></div>
              <p class="metric-sub" id="uv-label"></p>
            </div>

            <div class="metric-card glass">
              <p class="metric-label"><i data-lucide="eye"></i> Visibilidade</p>
              <p class="metric-val"><span id="visibility">—</span><span class="metric-unit"> km</span></p>
            </div>

            <div class="metric-card glass">
              <p class="metric-label"><i data-lucide="gauge"></i> Pressão Atm.</p>
              <p class="metric-val"><span id="pressure">—</span><span class="metric-unit"> hPa</span></p>
            </div>

          </section>

        </div><!-- /weather-content -->
      </main>
    </div>

    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
